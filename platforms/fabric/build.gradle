plugins {
    id("java")
    id("com.gradleup.shadow") version "${shadow_version}"
    id "com.modrinth.minotaur" version "${modrinth_minotaur_version}"
    id("net.fabricmc.fabric-loom") version "1.14-SNAPSHOT"
}

repositories {
    mavenCentral()
}


loom {
    splitEnvironmentSourceSets()

    mods {
        "discordio" {
            sourceSet sourceSets.main
        }
    }
}

dependencies {
    implementation(project(":core"))

    minecraft "com.mojang:minecraft:${project.minecraft_version}"
    // mappings "net.fabricmc:yarn:${project.yarn_mappings}:v2"
    implementation "net.fabricmc:fabric-loader:${project.loader_version}"

    implementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
}

shadowJar {
    from(project(":core").sourceSets.main.output)
    configurations = [ project(":core").configurations.runtimeClasspath ]
    exclude(group = "net.fabricmc")
    exclude(group = "net.fabricmc.fabric-api")
    exclude(group = "com.mojang")

    exclude(group="net.dv8tion")
    exclude(group="com.fasterxml")
    exclude(group="okhttp3")
    exclude(group="okio")
    exclude(group="org.slf4j")
    exclude(group="oshi")
    exclude(group="com.sun.jna")

    archiveVersion = ""
}
build.dependsOn shadowJar

processResources {
    inputs.property "version", project.version
    inputs.property "minecraft_version", project.minecraft_version
    inputs.property "loader_version", project.loader_version
    inputs.property "depends_minecraft_version", project.depends_minecraft_version
    inputs.property "depends_loader_version", project.depends_loader_version
    filteringCharset "UTF-8"

    filesMatching("fabric.mod.json") {
        expand "version": project.version,
                "minecraft_version": project.minecraft_version,
                "loader_version": project.loader_version,
                "depends_minecraft_version": project.depends_minecraft_version,
                "depends_loader_version": project.depends_loader_version
    }
}

java {
    sourceCompatibility = "25"
    targetCompatibility = "25"

    // Fabric loom:
    withSourcesJar()
}

// Renames the jar file:
tasks.register("generatePublishJar", Jar) {
    dependsOn tasks.shadowJar

    from(zipTree(tasks.shadowJar.archiveFile))
    archiveFileName.set("discordio-fabric-${version}.jar")
    destinationDirectory.set(tasks.shadowJar.destinationDirectory)
}
modrinth {
    token = "${rootProject.ext.modrinth_token}"
    projectId = "${rootProject.ext.modrinth_id}"
    versionNumber = "${version}"
    versionName = "Discordio - Fabric 26.1 - ${version}"
    versionType = "${modrinth_version_type}"
    uploadFile = generatePublishJar
    gameVersions = "${modrinth_minecraft_versions}".tokenize(" ")
    loaders = ['fabric']
    changelog = "${rootProject.ext.modrinth_changelog}"
}